<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - RakanPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); font-family: 'Inter', sans-serif; }
    .login-wrapper { width: 100%; max-width: 440px; padding: 20px; }
    .login-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 48px 40px; box-shadow: 0 25px 60px rgba(0,0,0,0.4); }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 36px; }
    .official-logo-white { height: 60px; width: auto; border-radius: 8px; object-fit: contain; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2)); }
    .login-logo .logo-text { display: flex; gap: 2px; }
    .login-logo .rakan { font-size: 1.6rem; font-weight: 800; color: #fff; }
    .login-logo .pay { font-size: 1.6rem; font-weight: 800; color: #38BDF8; }
    .login-title { text-align: center; margin-bottom: 32px; }
    .login-title h1 { color: #fff; font-size: 1.5rem; font-weight: 700; margin: 0 0 8px; }
    .login-title p { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin: 0; }
    .login-form .form-group { margin-bottom: 20px; }
    .login-form label { display: block; color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; }
    .login-form input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 0.95rem; font-family: inherit; outline: none; transition: all 0.3s ease; box-sizing: border-box; }
    .login-form input:focus { border-color: #3B82F6; background: rgba(59,130,246,0.08); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .login-form input::placeholder { color: rgba(255,255,255,0.3); }
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #1D4ED8, #3B82F6); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-family: inherit; margin-top: 8px; }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(29,78,216,0.4); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-alert { padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px; display: none; }
    .login-alert.error { background: rgba(239,68,68,0.15); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.2); display: block; }
    .login-alert.success { background: rgba(34,197,94,0.15); color: #86EFAC; border: 1px solid rgba(34,197,94,0.2); display: block; }
    .login-footer { text-align: center; margin-top: 24px; }
    .login-footer a { color: #38BDF8; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
    .login-footer a:hover { text-decoration: underline; }
    /* Floating background shapes */
    .bg-shape { position: fixed; border-radius: 50%; background: linear-gradient(135deg, rgba(29,78,216,0.15), rgba(56,189,248,0.1)); pointer-events: none; }
    .bg-shape-1 { width: 400px; height: 400px; top: -100px; right: -100px; }
    .bg-shape-2 { width: 300px; height: 300px; bottom: -80px; left: -80px; }
    .bg-shape-3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.3; }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="bg-shape bg-shape-3"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 010-4h14v4"/><path d="M3 5v14a2 2 0 002 2h16v-5H5v5"/></svg>
        <div class="logo-text">
          <span class="rakan">Rakan</span><span class="pay">Pay</span>
        </div>
      </div>

      <div class="login-title">
        <h1>Login Admin</h1>
        <p>Masuk ke panel admin untuk mengelola data</p>
      </div>

      <div id="alertBox" class="login-alert"></div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@rakanponsel.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Masuk</button>
      </form>

      <div class="login-footer">
        <a href="index.html">← Kembali ke Beranda</a>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const alertBox = document.getElementById('alertBox');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginBtn.disabled = true;
      loginBtn.textContent = 'Memproses...';
      alertBox.className = 'login-alert';
      alertBox.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('api/auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          alertBox.className = 'login-alert success';
          alertBox.textContent = 'Login berhasil! Mengarahkan ke dashboard...';
          alertBox.style.display = 'block';
          setTimeout(() => {
            window.location.href = 'admin/dashboard.html';
          }, 1000);
        } else {
          alertBox.className = 'login-alert error';
          alertBox.textContent = data.error || 'Login gagal';
          alertBox.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Masuk';
        }
      } catch (err) {
        alertBox.className = 'login-alert error';
        alertBox.textContent = 'Terjadi kesalahan koneksi. Pastikan server PHP berjalan.';
        alertBox.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Masuk';
      }
    });
  </script>
</body>
</html>
