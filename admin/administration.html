<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration - RakanPay Admin</title>
  <meta name="description" content="Kelola pengguna dan admin RakanPay.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #1a1f37;
      --sidebar-width: 240px;
      --body-bg: #f0f2f8;
      --card-bg: #ffffff;
      --text-primary: #1a1f37;
      --text-secondary: #6c7293;
      --text-muted: #a0a3bd;
      --accent-blue: #4f6cf7;
      --accent-blue-light: #eef1ff;
      --accent-red: #ff6b6b;
      --accent-red-light: #fff0f0;
      --accent-green: #2dce89;
      --accent-green-light: #e8faf1;
      --accent-orange: #fb6340;
      --accent-orange-light: #fff3ef;
      --accent-yellow: #ffc107;
      --accent-yellow-light: #fff9e6;
      --accent-cyan: #11cdef;
      --border-color: #e9ecf5;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow-sm: 0 2px 12px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--body-bg);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================
       SIDEBAR
    ============================ */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #4f6cf7, #11cdef);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; }

    .logo-text-group { display: flex; flex-direction: column; }
    .logo-brand { font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
    .logo-sub { font-size: 0.55rem; font-weight: 500; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; text-transform: uppercase; }

    .sidebar-close {
      background: none; border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer; padding: 4px;
      transition: color 0.2s; font-size: 1.1rem;
    }
    .sidebar-close:hover { color: #fff; }

    .sidebar-nav {
      flex: 1;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-label {
      font-size: 0.65rem; font-weight: 700;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 16px 14px 8px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-size: 0.88rem; font-weight: 500;
      transition: all 0.2s ease;
    }
    .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; opacity: 0.7; }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
    .nav-item:hover svg { opacity: 1; }
    .nav-item.active {
      background: linear-gradient(135deg, var(--accent-blue), #6f86fc);
      color: #fff;
      box-shadow: 0 4px 15px rgba(79,108,247,0.35);
    }
    .nav-item.active svg { opacity: 1; }

    /* ============================
       MAIN CONTENT
    ============================ */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: var(--body-bg);
    }

    .breadcrumb { display: flex; flex-direction: column; gap: 2px; }
    .breadcrumb-path { font-size: 0.75rem; color: var(--text-muted); }
    .breadcrumb-path a { color: var(--accent-blue); text-decoration: none; }
    .breadcrumb-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }

    .top-bar-actions { display: flex; align-items: center; gap: 12px; }

    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 9px 16px;
      min-width: 200px;
      box-shadow: var(--shadow-sm);
    }
    .search-box svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
    .search-box input {
      border: none; outline: none; background: none;
      font-size: 0.85rem; color: var(--text-primary);
      font-family: inherit; width: 100%;
    }
    .search-box input::placeholder { color: var(--text-muted); }

    .user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue), #11cdef);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(79,108,247,0.3);
    }

    .content-area { padding: 28px; }

    /* ============================
       VIEWS
    ============================ */
    .view-section { display: none; animation: fadeIn 0.3s ease; }
    .view-section.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card-bg); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);
      padding: 24px;
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .card-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none;
      font-family: inherit; transition: all 0.2s ease;
    }
    .btn svg { width: 16px; height: 16px; }
    .btn-primary { background: linear-gradient(135deg, var(--accent-blue), #6f86fc); color: #fff; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(79,108,247,0.35); }
    .btn-secondary { background: var(--body-bg); color: var(--text-secondary); border: 1.5px solid var(--border-color); }
    .btn-secondary:hover { background: #e4e7ef; }

    /* TABLE */
    .table-responsive { overflow-x: auto; margin-top: 10px; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td {
      padding: 16px 20px; text-align: left; font-size: 0.85rem;
      border-bottom: 1px solid var(--border-color); color: var(--text-primary);
    }
    .data-table th { font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.75rem; }
    .data-table tr:last-child td { border-bottom: none; }
    
    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-admin { background: var(--accent-blue-light); color: var(--accent-blue); border: 1px solid rgba(79,108,247,0.2); }
    
    .btn-icon {
      width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .btn-icon svg { width: 14px; height: 14px; }
    .btn-view { background: var(--accent-blue-light); color: var(--accent-blue); }
    .btn-view:hover { background: var(--accent-blue); color: #fff; }
    .btn-edit { background: var(--accent-yellow-light); color: var(--accent-yellow); }
    .btn-edit:hover { background: var(--accent-yellow); color: #fff; }
    .btn-delete { background: var(--accent-red-light); color: var(--accent-red); }
    .btn-delete:hover { background: var(--accent-red); color: #fff; }
    .action-btns { display: flex; gap: 8px; }

    /* FORM */
    .form-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .form-layout { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: var(--text-primary); margin-bottom: 8px;
    }
    .form-control {
      width: 100%; padding: 11px 16px; background: var(--body-bg);
      border: 1.5px solid var(--border-color); border-radius: 10px;
      color: var(--text-primary); font-size: 0.88rem; font-family: inherit;
      outline: none; transition: all 0.2s ease;
    }
    .form-control:focus { border-color: var(--accent-blue); background: #fff; }
    .form-actions { display: flex; gap: 10px; margin-top: 28px; }

    /* DETAIL VIEW */
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .detail-item { background: var(--body-bg); padding: 16px 20px; border-radius: 12px; border: 1px solid var(--border-color); }
    .detail-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 6px; }
    .detail-value { font-size: 0.95rem; color: var(--text-primary); font-weight: 600; word-break: break-all; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--card-bg);
      border: 1px solid var(--border-color); border-radius: 12px; padding: 14px 20px;
      display: flex; align-items: center; gap: 10px; font-size: 0.85rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 300;
      transform: translateY(100px); opacity: 0; transition: all 0.3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid var(--accent-green); }
    .toast.error { border-left: 4px solid var(--accent-red); }

    /* Mobile */
    .mobile-menu-btn { display: none; background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 4px; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 10px 0 40px rgba(0,0,0,0.3); }
      .main-content { margin-left: 0; }
      .mobile-menu-btn { display: flex; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="white"/></svg>

  <main class="main-content">
    <header class="top-bar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="breadcrumb">
          <span class="breadcrumb-path"><a href="#">Administration</a></span>
          <h1 class="breadcrumb-title" id="pageTitle">Daftar Admin</h1>
        </div>
      </div>
      <div class="top-bar-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search">
        </div>
        <div class="user-avatar">A</div>
      </div>
    </header>

    <div class="content-area">
      <!-- LIST VIEW -->
      <section id="viewList" class="view-section active">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Daftar Administration</h2>
            <button class="btn btn-primary" onclick="showView('Form')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Tambah Data
            </button>
          </div>
          <div class="table-responsive">
            <table class="data-table">
              <thead><tr><th width="50">No</th><th>Username</th><th>Name</th><th>Email</th><th>Role</th><th width="150">Aksi</th></tr></thead>
              <tbody id="dataTableBody">
                <!-- Mock Data Injected Here -->
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- FORM VIEW -->
      <section id="viewForm" class="view-section">
        <div class="card" style="max-width: 800px;">
          <h2 class="card-title" id="formTitle" style="margin-bottom: 24px;">Tambah Administration</h2>
          <form onsubmit="return false;">
            <input type="hidden" id="adminId">
            <div class="form-layout">
              <div class="form-group"><label>Username</label><input type="text" class="form-control" id="formUsername" required></div>
              <div class="form-group"><label>Name</label><input type="text" class="form-control" id="formName" required></div>
              <div class="form-group"><label>Email</label><input type="email" class="form-control" id="formEmail" required></div>
              <div class="form-group"><label>Password</label><input type="password" class="form-control" id="formPassword" placeholder="Kosongkan jika tidak ingin mengubah (saat edit)"></div>
              <div class="form-group">
                <label>Role</label>
                <select class="form-control" id="formRole" required>
                  <option value="Administrator">Administrator</option>
                  <option value="Editor">Editor</option>
                </select>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" onclick="saveData()">Simpan Perubahan</button>
              <button class="btn btn-secondary" onclick="showView('List')">Batal</button>
            </div>
          </form>
        </div>
      </section>

      <!-- DETAIL VIEW -->
      <section id="viewDetail" class="view-section">
        <div class="card" style="max-width: 800px;">
          <div class="card-header">
            <h2 class="card-title">Lihat Administration</h2>

            <div class="detail-item"><div class="detail-label">Name</div><div class="detail-value" id="detailName"></div></div>
            <div class="detail-item"><div class="detail-label">Email</div><div class="detail-value" id="detailEmail"></div></div>
            <div class="detail-item"><div class="detail-label">Role</div><div class="detail-value"><span class="badge badge-admin" id="detailRole"></span></div></div>
            <div class="detail-item"><div class="detail-label">Password</div><div class="detail-value">********</div></div>
          </div>
          <button class="btn btn-secondary" onclick="showView('List')">Kembali</button>
        </div>
      </section>

  <script>
    let admins = [
      { id: 1, username: 'admin', name: 'Administrator RakanPay', email: 'admin@rakanpay.com', role: 'Administrator' }
    ];

    function showView(view) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.getElementById('view' + view).classList.add('active');
      
      const title = document.getElementById('pageTitle');
      if(view === 'List') { title.textContent = 'Daftar Admin'; renderTable(); }
      else if(view === 'Form') { 
        title.textContent = document.getElementById('adminId').value ? 'Edit Admin' : 'Tambah Admin'; 
      }
      else if(view === 'Detail') { title.textContent = 'Lihat Admin'; }
    }

    function renderTable() {
      const tbody = document.getElementById('dataTableBody');
      tbody.innerHTML = '';
      admins.forEach((admin, index) => {
        tbody.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td><strong>${admin.username}</strong></td>
            <td>${admin.name}</td>
            <td>${admin.email}</td>
            <td><span class="badge badge-admin">${admin.role}</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-icon btn-view" title="Lihat" onclick="viewData(${admin.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                <button class="btn-icon btn-edit" title="Edit" onclick="editData(${admin.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                <button class="btn-icon btn-delete" title="Hapus" onclick="deleteData(${admin.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
              </div>
            </td>
          </tr>
        `;
      });
    }

    function viewData(id) {
      const admin = admins.find(a => a.id === id);
      document.getElementById('detailUsername').textContent = admin.username;
      document.getElementById('detailName').textContent = admin.name;
      document.getElementById('detailEmail').textContent = admin.email;
      document.getElementById('detailRole').textContent = admin.role;
      document.getElementById('btnEditFromDetail').onclick = () => editData(id);
      showView('Detail');
    }

    function editData(id) {
      const admin = admins.find(a => a.id === id);
      document.getElementById('formTitle').textContent = 'Edit Administration';
      document.getElementById('adminId').value = admin.id;
      document.getElementById('formUsername').value = admin.username;
      document.getElementById('formName').value = admin.name;
      document.getElementById('formEmail').value = admin.email;
      document.getElementById('formPassword').value = '';
      document.getElementById('formRole').value = admin.role;
      showView('Form');
    }

    function saveData() {
      const id = document.getElementById('adminId').value;
      const username = document.getElementById('formUsername').value;
      const name = document.getElementById('formName').value;
      const email = document.getElementById('formEmail').value;
      const role = document.getElementById('formRole').value;

      if(!username || !name || !email) return showToast('Harap lengkapi semua field wajib', 'error');

      if(id) {
        const idx = admins.findIndex(a => a.id == id);
        admins[idx] = { ...admins[idx], username, name, email, role };
        showToast('Data berhasil diupdate');
      } else {
        admins.push({ id: Date.now(), username, name, email, role });
        showToast('Data berhasil ditambahkan');
      }

      showView('List');
    }

    function deleteData(id) {
      if(confirm('Apakah Anda yakin ingin menghapus admin ini?')) {
        admins = admins.filter(a => a.id !== id);
        renderTable();
        showToast('Data berhasil dihapus', 'error');
      }
    }

    // Reset Form when clicking Tambah Data directly
    document.querySelector('.btn-primary[onclick="showView(\'Form\')"]').addEventListener('click', () => {
      document.getElementById('formTitle').textContent = 'Tambah Administration';
      document.getElementById('adminId').value = '';
      document.getElementById('formUsername').value = '';
      document.getElementById('formName').value = '';
      document.getElementById('formEmail').value = '';
      document.getElementById('formPassword').value = '';
      document.getElementById('formRole').value = 'Administrator';
    });

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add('show'), 50);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
    }

    document.getElementById('mobileMenuBtn').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').style.display = 'block'; };
    document.getElementById('sidebarCloseBtn').onclick = document.getElementById('sidebarOverlay').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').style.display = 'none'; };

    // Initial render
    renderTable();
  </script>
</body>
</html>
