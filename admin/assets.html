<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assets - RakanPay Admin</title>
  <meta name="description" content="Kelola asset dan file media RakanPay.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #1a1f37;
      --sidebar-width: 240px;
      --body-bg: #f0f2f8;
      --card-bg: #ffffff;
      --text-primary: #1a1f37;
      --text-secondary: #6c7293;
      --text-muted: #a0a3bd;
      --accent-blue: #4f6cf7;
      --accent-blue-light: #eef1ff;
      --accent-red: #ff6b6b;
      --accent-red-light: #fff0f0;
      --accent-green: #2dce89;
      --accent-green-light: #e8faf1;
      --accent-orange: #fb6340;
      --accent-orange-light: #fff3ef;
      --accent-yellow: #ffc107;
      --accent-yellow-light: #fff9e6;
      --accent-cyan: #11cdef;
      --border-color: #e9ecf5;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow-sm: 0 2px 12px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--body-bg);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================
       SIDEBAR
    ============================ */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #4f6cf7, #11cdef);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; }

    .logo-text-group { display: flex; flex-direction: column; }
    .logo-brand { font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
    .logo-sub { font-size: 0.55rem; font-weight: 500; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; text-transform: uppercase; }

    .sidebar-close {
      background: none; border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer; padding: 4px;
      transition: color 0.2s; font-size: 1.1rem;
    }
    .sidebar-close:hover { color: #fff; }

    .sidebar-nav {
      flex: 1;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-label {
      font-size: 0.65rem; font-weight: 700;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 16px 14px 8px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-size: 0.88rem; font-weight: 500;
      transition: all 0.2s ease;
    }
    .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; opacity: 0.7; }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
    .nav-item:hover svg { opacity: 1; }
    .nav-item.active {
      background: linear-gradient(135deg, var(--accent-blue), #6f86fc);
      color: #fff;
      box-shadow: 0 4px 15px rgba(79,108,247,0.35);
    }
    .nav-item.active svg { opacity: 1; }

    /* ============================
       MAIN CONTENT
    ============================ */
    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: var(--body-bg);
    }

    .breadcrumb { display: flex; flex-direction: column; gap: 2px; }
    .breadcrumb-path { font-size: 0.75rem; color: var(--text-muted); }
    .breadcrumb-path a { color: var(--accent-blue); text-decoration: none; }
    .breadcrumb-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }

    .top-bar-actions { display: flex; align-items: center; gap: 12px; }

    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 9px 16px;
      min-width: 200px;
      box-shadow: var(--shadow-sm);
    }
    .search-box svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
    .search-box input {
      border: none; outline: none; background: none;
      font-size: 0.85rem; color: var(--text-primary);
      font-family: inherit; width: 100%;
    }
    .search-box input::placeholder { color: var(--text-muted); }

    .user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue), #11cdef);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(79,108,247,0.3);
    }

    .content-area { padding: 28px; }

    /* ============================
       VIEWS
    ============================ */
    .card {
      background: var(--card-bg); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);
      padding: 24px; margin-bottom: 24px;
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .card-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none;
      font-family: inherit; transition: all 0.2s ease;
    }
    .btn svg { width: 16px; height: 16px; }
    .btn-primary { background: linear-gradient(135deg, var(--accent-blue), #6f86fc); color: #fff; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(79,108,247,0.35); }
    .btn-secondary { background: var(--body-bg); color: var(--text-secondary); border: 1.5px solid var(--border-color); }
    .btn-secondary:hover { background: #e4e7ef; }

    /* UPLOAD AREA */
    .upload-zone {
      border: 2px dashed var(--accent-blue); background: var(--accent-blue-light);
      border-radius: 16px; padding: 40px; text-align: center;
      cursor: pointer; transition: all 0.3s ease;
    }
    .upload-zone:hover { background: #e0e7ff; }
    .upload-icon {
      width: 64px; height: 64px; background: #fff; color: var(--accent-blue);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; box-shadow: var(--shadow-sm);
    }
    .upload-icon svg { width: 32px; height: 32px; }
    .upload-title { font-size: 1.1rem; font-weight: 700; color: var(--accent-blue); margin-bottom: 8px; }
    .upload-desc { font-size: 0.85rem; color: var(--text-secondary); }

    /* TABLE */
    .table-responsive { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td {
      padding: 16px 20px; text-align: left; font-size: 0.85rem;
      border-bottom: 1px solid var(--border-color); color: var(--text-primary);
    }
    .data-table th { font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.75rem; }
    .data-table tr:last-child td { border-bottom: none; }
    
    .file-preview {
      width: 40px; height: 40px; border-radius: 8px; object-fit: cover;
      background: var(--body-bg); display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 10px; font-weight: 700;
    }
    .file-name-cell { display: flex; align-items: center; gap: 12px; }
    .file-name { font-weight: 600; color: var(--text-primary); }
    .file-link { font-size: 0.75rem; color: var(--accent-blue); display: block; margin-top: 4px; word-break: break-all; }

    .btn-icon {
      width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .btn-icon svg { width: 14px; height: 14px; }
    .btn-copy { background: var(--accent-green-light); color: var(--accent-green); }
    .btn-copy:hover { background: var(--accent-green); color: #fff; }
    .btn-delete { background: var(--accent-red-light); color: var(--accent-red); }
    .btn-delete:hover { background: var(--accent-red); color: #fff; }
    .action-btns { display: flex; gap: 8px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--card-bg);
      border: 1px solid var(--border-color); border-radius: 12px; padding: 14px 20px;
      display: flex; align-items: center; gap: 10px; font-size: 0.85rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 300;
      transform: translateY(100px); opacity: 0; transition: all 0.3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid var(--accent-green); }
    .toast.error { border-left: 4px solid var(--accent-red); }

    /* Mobile */
    .mobile-menu-btn { display: none; background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 4px; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 10px 0 40px rgba(0,0,0,0.3); }
      .main-content { margin-left: 0; }
      .mobile-menu-btn { display: flex; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">

          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="white"/></svg>

      </a>
      <a href="promo.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Promo
      </a>
      <a href="administration.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Administration

  <main class="main-content">
    <header class="top-bar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="breadcrumb">
          <span class="breadcrumb-path"><a href="#">Assets</a></span>
          <h1 class="breadcrumb-title">Media & File Assets</h1>
        </div>
      </div>
      <div class="top-bar-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search file...">
        </div>
        <div class="user-avatar">A</div>
      </div>
    </header>

    <div class="content-area">
      <div class="card" style="margin-bottom: 24px;">
        <div class="upload-zone" onclick="document.getElementById('fileUpload').click()" id="dropZone">
          <input type="file" id="fileUpload" style="display:none" multiple>
          <div class="upload-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <div class="upload-title">Klik atau Drop File di Sini</div>
          <div class="upload-desc">Dukung file gambar (JPG, PNG) dan dokumen. Ukuran max 5MB.</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Daftar File / Asset</h2>
        </div>
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th width="350">Nama File</th>
                <th>Ukuran</th>
                <th>Tanggal Upload</th>
                <th width="150">Aksi</th>
              </tr>
            </thead>
            <tbody id="fileTableBody">
              <!-- Data -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    let files = [
      { id: 1, name: 'banner-promo-juni.jpg', url: 'https://rakanpay.com/assets/img/banner-promo-juni.jpg', size: '1.2 MB', date: '2023-06-15', type: 'image' },
      { id: 2, name: 'logo-rakanpay-transparent.png', url: 'https://rakanpay.com/assets/img/logo-rakanpay-transparent.png', size: '500 KB', date: '2023-06-10', type: 'image' },
      { id: 3, name: 'panduan-pengguna.pdf', url: 'https://rakanpay.com/assets/doc/panduan-pengguna.pdf', size: '3.4 MB', date: '2023-06-05', type: 'doc' }
    ];

    function renderTable() {
      const tbody = document.getElementById('fileTableBody');
      tbody.innerHTML = '';
      files.forEach((file) => {
        let preview = '';
        if (file.type === 'image') {
          preview = `<img src="${file.url}" class="file-preview" onerror="this.outerHTML='<div class=\\'file-preview\\'>IMG</div>'">`;
        } else {
          preview = `<div class="file-preview">DOC</div>`;
        }

        tbody.innerHTML += `
          <tr>
            <td>
              <div class="file-name-cell">
                ${preview}
                <div>
                  <div class="file-name">${file.name}</div>
                  <span class="file-link">${file.url}</span>
                </div>
              </div>
            </td>
            <td>${file.size}</td>
            <td>${file.date}</td>
            <td>
              <div class="action-btns">
                <button class="btn-icon btn-copy" title="Copy Link" onclick="copyLink('${file.url}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                <button class="btn-icon btn-delete" title="Hapus File" onclick="deleteFile(${file.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
              </div>
            </td>
          </tr>
        `;
      });
    }

    function copyLink(url) {
      navigator.clipboard.writeText(url).then(() => {
        showToast('Link disalin ke clipboard');
      });
    }

    function deleteFile(id) {
      if(confirm('Yakin ingin menghapus file ini secara permanen?')) {
        files = files.filter(f => f.id !== id);
        renderTable();
        showToast('File berhasil dihapus', 'error');
      }
    }

    // Handle Upload Simulation
    document.getElementById('fileUpload').addEventListener('change', function(e) {
      if(this.files.length > 0) {
        Array.from(this.files).forEach(f => {
          const type = f.type.startsWith('image/') ? 'image' : 'doc';
          files.unshift({
            id: Date.now() + Math.random(),
            name: f.name,
            url: 'https://rakanpay.com/assets/uploads/' + f.name.replace(/\\s+/g, '-').toLowerCase(),
            size: (f.size / 1024 / 1024).toFixed(2) + ' MB',
            date: new Date().toISOString().split('T')[0],
            type: type
          });
        });
        renderTable();
        showToast('File berhasil diupload');
        this.value = ''; // reset
      }
    });

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#e0e7ff'; });
    dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.style.background = ''; });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault(); dropZone.style.background = '';
      if(e.dataTransfer.files.length > 0) {
        document.getElementById('fileUpload').files = e.dataTransfer.files;
        const event = new Event('change');
        document.getElementById('fileUpload').dispatchEvent(event);
      }
    });

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast ${type}`; t.innerHTML = `<span>${msg}</span>`;
      document.body.appendChild(t);
      setTimeout(() => t.classList.add('show'), 50);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
    }

    document.getElementById('mobileMenuBtn').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').style.display = 'block'; };
    document.getElementById('sidebarCloseBtn').onclick = document.getElementById('sidebarOverlay').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').style.display = 'none'; };

    // Init
    renderTable();
  </script>
</body>
</html>
