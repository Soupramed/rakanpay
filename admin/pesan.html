<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesan Kontak - Admin RakanPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../admin-style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo"><img src="https://play-lh.googleusercontent.com/baMosBIP01ULCVugbF6FCqgcltCnbKYSsCVFKZ0lAJZsC1F7G5Psy_vApT8Hdox7tuUmX-9BPWSqFEx2GLFn" alt="Rakan Pay Logo" width="36" height="36" style="border-radius: 8px;"></a>
      <span class="sidebar-badge">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="produk.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>Produk</a>
      <a href="promo.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Promo</a>
      <a href="berita.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"/></svg>Berita</a>
      <a href="pesan.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Pesan</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" id="logoutBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</button></div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <button class="mobile-menu-btn" id="mobileMenuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="top-bar-title"><h1>Pesan Kontak</h1><p>Pesan dari pengunjung melalui form kontak</p></div>
    </header>

    <div class="page-header">
      <h2>Daftar Pesan <span id="unreadCount" style="font-size:0.85rem;color:#94a3b8;font-weight:400;"></span></h2>
    </div>

    <div class="page-content">
      <div class="table-card">
        <div class="table-wrapper">
          <table class="full-table">
            <thead><tr><th>No</th><th>Nama</th><th>Email</th><th>Subjek</th><th>Pesan</th><th>Tanggal</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="pesanTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header"><h3>Detail Pesan</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-body" id="pesanDetail"></div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeModal()">Tutup</button>
      </div>
    </div>
  </div>

  <script>
    fetch('../api/auth.php').then(r=>r.json()).then(d=>{if(!d.authenticated)window.location.href='../login.html';}).catch(()=>window.location.href='../login.html');

    async function loadPesan() {
      const res = await fetch('../api/admin/pesan.php');
      const data = await res.json();

      document.getElementById('unreadCount').textContent = data.unread > 0 ? `(${data.unread} belum dibaca)` : '';

      document.getElementById('pesanTable').innerHTML = data.data.map((m, i) => `
        <tr style="${m.is_read == 0 ? 'background:rgba(59,130,246,0.05);' : ''}">
          <td>${i + 1}</td>
          <td><strong>${m.nama}</strong></td>
          <td>${m.email}</td>
          <td>${m.subjek}</td>
          <td>${m.pesan.substring(0, 50)}...</td>
          <td>${new Date(m.created_at).toLocaleDateString('id-ID')}</td>
          <td>${m.is_read == 1 ? '<span class="badge badge-success">Dibaca</span>' : '<span class="badge badge-warning">Baru</span>'}</td>
          <td><div class="action-btns">
            <button class="btn btn-sm btn-primary" onclick='viewPesan(${JSON.stringify(m)})'>Lihat</button>
            <button class="btn btn-sm btn-danger" onclick="deletePesan(${m.id})">Hapus</button>
          </div></td>
        </tr>
      `).join('') || '<tr><td colspan="8" class="text-center">Tidak ada pesan</td></tr>';
    }
    loadPesan();

    async function viewPesan(m) {
      // Mark as read
      if (m.is_read == 0) {
        await fetch('../api/admin/pesan.php', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: m.id })
        });
        loadPesan();
      }

      document.getElementById('pesanDetail').innerHTML = `
        <div style="margin-bottom:16px;">
          <label style="color:#94a3b8;font-size:0.8rem;display:block;margin-bottom:4px;">Dari</label>
          <strong>${m.nama}</strong> (${m.email})
          ${m.telepon ? '<br>' + m.telepon : ''}
        </div>
        <div style="margin-bottom:16px;">
          <label style="color:#94a3b8;font-size:0.8rem;display:block;margin-bottom:4px;">Subjek</label>
          <strong>${m.subjek}</strong>
        </div>
        <div style="margin-bottom:16px;">
          <label style="color:#94a3b8;font-size:0.8rem;display:block;margin-bottom:4px;">Tanggal</label>
          ${new Date(m.created_at).toLocaleString('id-ID')}
        </div>
        <div>
          <label style="color:#94a3b8;font-size:0.8rem;display:block;margin-bottom:4px;">Pesan</label>
          <p style="line-height:1.6;white-space:pre-wrap;">${m.pesan}</p>
        </div>
      `;
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}

    async function deletePesan(id){
      if(!confirm('Yakin ingin menghapus pesan ini?'))return;
      const res=await fetch('../api/admin/pesan.php',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
      const data=await res.json();
      if(data.success){showToast(data.message,'success');loadPesan();}else{showToast(data.error,'error');}
    }

    function showToast(msg,type='success'){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.classList.add('show'),50);setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);}
    document.getElementById('logoutBtn').addEventListener('click',async()=>{await fetch('../api/auth.php',{method:'DELETE'});window.location.href='../login.html';});
    document.getElementById('mobileMenuBtn').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
  </script>
</body>
</html>
